server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Forçar o tipo MIME correto para módulos JavaScript
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        application/javascript                js mjs; # Aqui garantimos o .mjs
        application/atom+xml                  atom;
        application/rss+xml                   rss;
        font/woff                             woff;
        font/woff2                            woff2;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/webp                            webp;
        application/json                      json;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Access-Control-Allow-Origin *;
    }

    # Forçar cabeçalho para JS e MJS de forma explícita
    location ~* \.(js|mjs)$ {
        default_type application/javascript;
        add_header Access-Control-Allow-Origin *;
        expires 30d;
    }

    # Cache e CORS para assets
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin *;
    }

    error_page 404 /404.html;
}
